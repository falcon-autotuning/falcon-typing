name: Test

on:
  push:
    branches: [main]
    tags:
      - "v*"
  pull_request:
    branches: [main]

jobs:
  test-and-release:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build cmake build-essential mono-complete

      - name: Run tests
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
          FEED_URL: ${{ secrets.NUGET_FEED_URL }}
          FEED_NAME: ${{ secrets.NUGET_FEED_NAME }}
          USERNAME: $ {{ secrets.NUGET_USERNAME }}
        run: make test
